<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音読クラス分析</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    /* スクロールバーを隠す */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden">
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    // ========================================================
    // ★★★ 設定エリア ★★★
    // ========================================================
    // ※ 生徒用アプリ(index.html)と同じURLを設定してください。
    const TEACHERS = [
      { id: 'nakamura', name: '中村先生', url: "https://script.google.com/macros/s/AKfycby9-Z-2MzMxxWRbJYDQKqDKKc8T5pJ-84-L9Wa0xvW4OGymyF7SrGozBceH1T9AKFKH_Q/exec" },
      { id: 'kobari', name: '小針先生', url: "小針先生のGAS_URLをここに貼り付け" },
      { id: 'mochizuki', name: '望月先生', url: "望月先生のGAS_URLをここに貼り付け" },
      { id: 'uomi', name: '魚躬先生', url: "魚躬先生のGAS_URLをここに貼り付け" },
      { id: 'kaida', name: '貝田先生', url: "貝田先生のGAS_URLをここに貼り付け" }
    ];
    // ========================================================

    const { useState, useEffect, useMemo } = React;

    // アイコン群（分析テーマのかっこいいアイコンにアップデート）
    const IconChart = ({className}) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M3 3v18h18" strokeWidth="2" />
        <path d="M7 16v5" strokeWidth="3" opacity="0.6" />
        <path d="M12 10v11" strokeWidth="3" opacity="0.6" />
        <path d="M17 14v7" strokeWidth="3" opacity="0.6" />
        <path d="M4 14l4-5 4 3 7-8" strokeWidth="2" />
        <path d="M15 4h4v4" strokeWidth="2" />
      </svg>
    );
    const IconAlert = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconStar = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
    const IconLoader = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconLogOut = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;

    // 日付を YYYY/MM/DD 形式にする関数
    const formatDate = (dateString) => {
      if (!dateString) return "";
      const d = new Date(dateString);
      if (isNaN(d.getTime())) return "";
      return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')}`;
    };

    function Dashboard() {
      const [step, setStep] = useState('selectTeacher');
      const [rawData, setRawData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [activeTeacherName, setActiveTeacherName] = useState("");

      const [selectedClass, setSelectedClass] = useState("");
      const [selectedLesson, setSelectedLesson] = useState("");
      const [selectedDate, setSelectedDate] = useState("すべて"); // ★ 追加：日付フィルター

      const handleSelectTeacher = async (teacher) => {
        if (!teacher.url || teacher.url.includes("ここに")) {
          alert("先生のGASのURLが正しく設定されていません。");
          return;
        }
        
        setLoading(true);
        setActiveTeacherName(teacher.name);
        
        try {
          const res = await fetch(teacher.url, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: "getDashboardData" })
          });
          const response = await res.json();
          if (response.success) {
            // ★ 追加：データ取得時に日付をフォーマットしておく
            const processedData = response.data.map(d => ({
              ...d,
              formattedDate: d.date ? formatDate(d.date) : '不明'
            }));
            setRawData(processedData);
            setStep('dashboard');
          } else {
            alert(response.error);
            setActiveTeacherName("");
          }
        } catch (e) {
          alert("通信エラーが発生しました。\nURLやデプロイ設定(全員)を確認してください。");
          setActiveTeacherName("");
        }
        setLoading(false);
      };

      const handleLogout = () => {
        setRawData([]);
        setSelectedClass("");
        setSelectedLesson("");
        setSelectedDate("すべて");
        setStep('selectTeacher');
      };

      const availableClasses = useMemo(() => [...new Set(rawData.map(d => d.classNum))].filter(Boolean).sort((a,b)=>a-b), [rawData]);
      
      const availableLessons = useMemo(() => {
        const lessons = rawData.map(d => {
          const match = d.lessonPart.match(/^L(\d+)/);
          return match ? match[1] : null;
        }).filter(Boolean);
        return [...new Set(lessons)].sort((a,b)=>a-b);
      }, [rawData]);

      // ★ 追加：選ばれたクラス・レッスンの中で存在する日付のリストを作る
      const availableDates = useMemo(() => {
        const dates = rawData.filter(d => 
          d.classNum.toString() === selectedClass && 
          d.lessonPart.startsWith(`L${selectedLesson}`)
        ).map(d => d.formattedDate).filter(Boolean);
        
        return ["すべて", ...new Set(dates)].sort((a,b) => {
            if(a === "すべて") return -1;
            if(b === "すべて") return 1;
            return b.localeCompare(a); // 新しい日付が上に来るように降順
        });
      }, [rawData, selectedClass, selectedLesson]);

      // クラスやレッスンを切り替えたら、日付フィルターを一旦「すべて」に戻す
      useEffect(() => {
        setSelectedDate("すべて");
      }, [selectedClass, selectedLesson]);

      useEffect(() => {
        if (availableClasses.length > 0 && !selectedClass) setSelectedClass(availableClasses[0].toString());
        if (availableLessons.length > 0 && !selectedLesson) setSelectedLesson(availableLessons[0].toString());
      }, [availableClasses, availableLessons]);

      // ★ 修正：日付フィルターの条件も追加
      const filteredData = useMemo(() => {
        return rawData.filter(d => 
          d.classNum.toString() === selectedClass && 
          d.lessonPart.startsWith(`L${selectedLesson}`) &&
          (selectedDate === "すべて" || d.formattedDate === selectedDate)
        );
      }, [rawData, selectedClass, selectedLesson, selectedDate]);

      const stats = useMemo(() => {
        if (filteredData.length === 0) return null;
        
        let totalSum = 0, pSum = 0, iSum = 0, fSum = 0;
        let badWords = {};
        let excellentWords = {};

        filteredData.forEach(d => {
          totalSum += Number(d.total) || 0;
          pSum += Number(d.p_score) || 0;
          iSum += Number(d.i_score) || 0;
          fSum += Number(d.f_score) || 0;

          const extractTags = (text, tag, dict) => {
            const regex = new RegExp(`<${tag}>(.*?)<\\/${tag}>`, 'g');
            let match;
            while ((match = regex.exec(text)) !== null) {
              const word = match[1].replace(/[^a-zA-Z0-9'-]/g, '').toLowerCase();
              if (word) dict[word] = (dict[word] || 0) + 1;
            }
          };
          extractTags(d.highlighted_text, 'bad', badWords);
          extractTags(d.highlighted_text, 'excellent', excellentWords);
        });

        const count = filteredData.length;
        const sortDict = (dict) => Object.entries(dict).sort((a, b) => b[1] - a[1]).slice(0, 10);

        return {
          count,
          avgTotal: (totalSum / count).toFixed(1),
          avgP: (pSum / count).toFixed(1),
          avgI: (iSum / count).toFixed(1),
          avgF: (fSum / count).toFixed(1),
          badRanking: sortDict(badWords),
          excellentRanking: sortDict(excellentWords)
        };
      }, [filteredData]);

      const generateAdvice = (stats) => {
        if (!stats) return "";
        let advice = `対象データは ${stats.count}件 です。`;
        
        if (stats.avgP < 2.8) advice += " 全体的に発音（カタカナ発音）に課題が見られます。";
        if (stats.avgF < 2.0) advice += " 音のつながり（リンキング）が途切れている生徒が多いようです。";
        if (stats.avgI >= 2.5) advice += " 抑揚（イントネーション）は全体的にとても素晴らしくできています！";
        
        if (stats.badRanking.length > 0) {
          advice += ` 特に「${stats.badRanking[0][0]}」や「${stats.badRanking[1]?.[0] || ''}」の発音でつまずく生徒が多いので、リピート練習をすると効果的です。`;
        }
        return advice;
      };

      if (step === 'selectTeacher') {
        return (
          <div className="fixed inset-0 bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-800 flex justify-center items-center p-4">
            <div className="bg-white rounded-[2.5rem] shadow-2xl p-8 sm:p-10 max-w-lg w-full text-center animate-fade-in relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-32 bg-blue-50 rounded-b-[50%] -z-10"></div>
              
              <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 mt-2 shadow-inner">
                <IconChart className="w-10 h-10" />
              </div>
              
              <h1 className="text-2xl font-extrabold text-gray-800 mb-2 tracking-tight">音読クラス分析</h1>
              <p className="text-gray-500 text-sm mb-8 font-bold">データを表示する先生を選んでください</p>
              
              {loading ? (
                <div className="py-12 flex flex-col items-center">
                  <div className="text-indigo-500 mb-4"><IconLoader className="w-10 h-10 animate-spin" /></div>
                  <p className="text-indigo-600 font-bold">データを取得中...</p>
                </div>
              ) : (
                <div className="flex flex-wrap justify-center gap-3">
                  {TEACHERS.map(t => (
                    <button 
                      key={t.id} 
                      onClick={() => handleSelectTeacher(t)}
                      className="px-6 py-3 bg-gray-50 hover:bg-indigo-50 text-gray-700 hover:text-indigo-700 border-2 border-gray-100 hover:border-indigo-200 rounded-xl font-bold transition-all active:scale-95 text-base shadow-sm"
                    >
                      {t.name}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="h-full flex flex-col p-2 sm:p-6 max-w-6xl mx-auto animate-fade-in">
          {/* ヘッダー＆フィルター */}
          <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl shadow-lg p-3 sm:p-5 flex flex-col sm:flex-row justify-between items-center text-white mb-4 shrink-0 gap-3">
            <div className="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
              <div className="bg-white/20 p-2 rounded-xl hidden sm:block"><IconChart className="w-6 h-6" /></div>
              <div className="text-center sm:text-left">
                <h1 className="text-lg sm:text-2xl font-black tracking-wider leading-none">音読クラス分析</h1>
                <span className="text-[10px] sm:text-xs font-bold text-blue-200">{activeTeacherName}</span>
              </div>
            </div>
            
            <div className="flex items-center gap-2 sm:gap-3 flex-wrap justify-center sm:justify-end">
              <div className="flex items-center bg-white/10 rounded-xl px-2 sm:px-3 py-1.5 border border-white/20">
                <span className="text-xs sm:text-sm font-bold mr-1 sm:mr-2">Class</span>
                <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="bg-transparent font-black text-base sm:text-xl outline-none cursor-pointer">
                  {availableClasses.map(c => <option key={c} value={c} className="text-gray-800">{c}組</option>)}
                </select>
              </div>
              <div className="flex items-center bg-white/10 rounded-xl px-2 sm:px-3 py-1.5 border border-white/20">
                <span className="text-xs sm:text-sm font-bold mr-1 sm:mr-2">Lesson</span>
                <select value={selectedLesson} onChange={e => setSelectedLesson(e.target.value)} className="bg-transparent font-black text-base sm:text-xl outline-none cursor-pointer">
                  {availableLessons.map(l => <option key={l} value={l} className="text-gray-800">L{l}</option>)}
                </select>
              </div>
              
              {/* ★ 追加：日付フィルター */}
              <div className="flex items-center bg-white/10 rounded-xl px-2 sm:px-3 py-1.5 border border-white/20">
                <span className="text-xs sm:text-sm font-bold mr-1 sm:mr-2">Date</span>
                <select value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="bg-transparent font-black text-base sm:text-xl outline-none cursor-pointer">
                  {availableDates.map(d => <option key={d} value={d} className="text-gray-800">{d}</option>)}
                </select>
              </div>

              <button onClick={handleLogout} className="p-1.5 sm:p-2 bg-white/10 hover:bg-white/20 rounded-xl transition-all" title="先生を選択し直す">
                <IconLogOut className="w-4 h-4 sm:w-5 sm:h-5" />
              </button>
            </div>
          </div>

          {/* メインコンテンツ */}
          {stats ? (
            <div className="flex-1 flex flex-col sm:flex-row gap-4 min-h-0">
              {/* 左パネル：平均点 */}
              <div className="w-full sm:w-1/3 flex flex-col gap-4 min-h-0">
                <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex flex-col items-center justify-center shrink-0 relative overflow-hidden">
                  <div className="absolute -right-4 -top-4 w-24 h-24 bg-blue-50 rounded-full z-0"></div>
                  <h3 className="text-sm font-bold text-gray-500 mb-2 z-10">クラス総合平均点</h3>
                  <div className="flex items-end gap-2 z-10">
                    <span className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-br from-blue-500 to-indigo-600">{stats.avgTotal}</span>
                    <span className="text-2xl text-gray-300 font-bold mb-1">/ 10</span>
                  </div>
                  <div className="mt-2 text-xs font-bold text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full z-10">集計対象: {stats.count}件</div>
                </div>

                <div className="flex-1 bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex flex-col gap-4 overflow-y-auto">
                  <h3 className="text-sm font-bold text-gray-500 mb-2">項目別 平均スコア</h3>
                  
                  {[{label: '発音', score: stats.avgP, max: 4, color: 'bg-blue-500'}, 
                    {label: '抑揚', score: stats.avgI, max: 3, color: 'bg-purple-500'}, 
                    {label: 'つながり', score: stats.avgF, max: 3, color: 'bg-teal-500'}].map((item, idx) => (
                    <div key={idx} className="flex flex-col gap-1.5">
                      <div className="flex justify-between items-end">
                        <span className="font-bold text-gray-700">{item.label}</span>
                        <span className="font-black text-gray-800 text-lg">{item.score} <span className="text-xs text-gray-400 font-normal">/ {item.max}</span></span>
                      </div>
                      <div className="h-3 w-full bg-gray-100 rounded-full overflow-hidden">
                        <div className={`h-full ${item.color} rounded-full transition-all duration-1000`} style={{ width: `${(item.score / item.max) * 100}%` }}></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* 右パネル：単語分析・傾向 */}
              <div className="w-full sm:w-2/3 flex flex-col gap-4 min-h-0">
                
                {/* 傾向コメント */}
                <div className="bg-indigo-50 rounded-3xl border border-indigo-100 p-5 shrink-0 flex items-start gap-4">
                  <div className="text-3xl">👨‍🏫</div>
                  <div>
                    <h3 className="text-sm font-black text-indigo-800 mb-1">AI クラス分析レポート</h3>
                    <p className="text-sm text-indigo-900 leading-relaxed font-medium">{generateAdvice(stats)}</p>
                  </div>
                </div>

                <div className="flex-1 flex gap-4 min-h-0">
                  {/* 要練習単語 */}
                  <div className="flex-1 bg-white rounded-3xl shadow-sm border border-gray-100 p-5 flex flex-col min-h-0">
                    <h3 className="text-sm font-bold text-orange-600 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2"><IconAlert className="w-5 h-5"/> クラスの弱点（要練習）</h3>
                    <div className="flex-1 overflow-y-auto pr-2 space-y-2.5">
                      {stats.badRanking.length > 0 ? stats.badRanking.map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center bg-orange-50 p-2.5 rounded-xl border border-orange-100">
                          <div className="flex items-center gap-3">
                            <span className="font-black text-orange-400 w-4 text-center">{idx + 1}</span>
                            <span className="font-bold text-gray-800 text-lg">{item[0]}</span>
                          </div>
                          <span className="text-xs font-bold text-orange-600 bg-white px-2 py-1 rounded shadow-sm">{item[1]}人がミス</span>
                        </div>
                      )) : <p className="text-gray-400 text-sm text-center mt-4">データがありません</p>}
                    </div>
                  </div>

                  {/* よくできた単語 */}
                  <div className="flex-1 bg-white rounded-3xl shadow-sm border border-gray-100 p-5 flex flex-col min-h-0">
                    <h3 className="text-sm font-bold text-blue-600 mb-4 flex items-center gap-2 border-b border-gray-100 pb-2"><IconStar className="w-5 h-5"/> みんなの得意単語</h3>
                    <div className="flex-1 overflow-y-auto pr-2 space-y-2.5">
                      {stats.excellentRanking.length > 0 ? stats.excellentRanking.map((item, idx) => (
                        <div key={idx} className="flex justify-between items-center bg-blue-50 p-2.5 rounded-xl border border-blue-100">
                          <div className="flex items-center gap-3">
                            <span className="font-black text-blue-400 w-4 text-center">{idx + 1}</span>
                            <span className="font-bold text-gray-800 text-lg">{item[0]}</span>
                          </div>
                          <span className="text-xs font-bold text-blue-600 bg-white px-2 py-1 rounded shadow-sm">{item[1]}人が成功</span>
                        </div>
                      )) : <p className="text-gray-400 text-sm text-center mt-4">データがありません</p>}
                    </div>
                  </div>
                </div>

              </div>
            </div>
          ) : (
            <div className="flex-1 flex justify-center items-center bg-white rounded-3xl shadow-sm border border-gray-100">
              <p className="text-gray-400 font-bold text-lg flex flex-col items-center gap-3">
                <IconChart className="w-12 h-12 text-gray-300" />
                選択された条件の採点データがありません。
              </p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
